version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # One PR per ecosystem per week, batching everything except major bumps.
    # Cuts review noise dramatically vs. the default per-dep PR.
    groups:
      cargo-deps:
        applies-to: version-updates
        update-types: [minor, patch]
      cargo-security:
        applies-to: security-updates
        update-types: [minor, patch]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        applies-to: version-updates
        update-types: [minor, patch]
